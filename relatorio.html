<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Relatório NPS</title>

<style>
body {
  font-family: Arial;
  background: #f4f6f9;
  padding: 30px;
}

.container {
  max-width: 1200px;
  margin: auto;
  background: white;
  padding: 25px;
  border-radius: 10px;
}

h2 {
  color: #1f3c88;
}

button {
  padding: 8px;
  margin-bottom: 15px;
}
</style>
</head>

<body>

<div class="container">

<h2>Relatório</h2>

<button onclick="exportar()">Exportar Excel</button>

<p><b>NPS Pós Venda:</b> <span id="npsVenda"></span></p>
<p><b>NPS Pós Suporte:</b> <span id="npsSuporte"></span></p>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const SUPABASE_URL = "https://etfdhxdgczpkglgoggyt.supabase.co";
const SUPABASE_KEY = "sb_publishable_AUguEJIlOy_l87hJeHsbNw_VdwPqRAl";

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ===== BUSCAR DADOS =====
async function carregar() {

  let { data, error } = await supabaseClient
    .from("respostas")
    .select("*");

  if (error) {
    alert("Erro: " + error.message);
    return;
  }

  calcularNPS(data);
}

function calcularNPS(lista) {

  let venda = lista.filter(r => r.tipo === "Pós Venda");
  let suporte = lista.filter(r => r.tipo === "Pós Suporte");

  document.getElementById("npsVenda").innerText = calcular(venda, "pergunta3");
  document.getElementById("npsSuporte").innerText = calcular(suporte, "indicacao");
}

// ===== CALCULO NPS =====
function calcular(lista, campo) {

  let promotores = 0;
  let detratores = 0;
  let total = 0;

  lista.forEach(r => {
    let nota = Number(r[campo]);

    if (isNaN(nota)) return;

    total++;

    if (nota >= 9) promotores++;
    if (nota <= 6) detratores++;
  });

  if (total === 0) return 0;

  return Math.round(((promotores - detratores) / total) * 100);
}

// ===== EXPORTAR =====
function exportar() {

  supabaseClient
    .from("respostas")
    .select("*")
    .then(({ data }) => {

      let csv = "Codigo;Cliente;Telefone;Tipo;Atendente;Pergunta1;Pergunta2;Pergunta3;Indicacao\n";

      data.forEach(r => {
        csv += [
          r.codigo || "",
          r.cliente || "",
          r.telefone || "",
          r.tipo || "",
          r.atendente || "",
          r.pergunta1 || "",
          r.pergunta2 || "",
          r.pergunta3 || "",
          r.indicacao || ""
        ].join(";") + "\n";
      });

      let blob = new Blob([csv], { type: "text/csv" });
      let link = document.createElement("a");

      link.href = URL.createObjectURL(blob);
      link.download = "relatorio.csv";
      link.click();
    });
}

carregar();
</script>

</body>
</html>
