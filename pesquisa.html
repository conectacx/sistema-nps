<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Pesquisa de Satisfação</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f6f9;
      margin: 0;
      padding: 30px;
      font-size: 14px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      background-color: #ffffff;
      padding: 30px;
      border-radius: 10px;
      box-sizing: border-box;
    }

    .topo-formulario {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 30px;
      margin-bottom: 30px;
    }

    .logo-esquerda,
    .logo-direita {
      width: 120px;
      text-align: center;
    }

    .titulo-centro {
      width: 700px;
      text-align: center;
    }

    .titulo-centro h1 {
      margin-bottom: 10px;
      color: #1f3c88;
    }

    .linha {
      height: 1px;
      background-color: #d9d9d9;
      margin: 10px auto;
      width: 100%;
    }

    .logo-formulario {
      max-width: 110px;
      height: auto;
    }

    #cliente,
    #tipo {
      margin: 4px 0;
      font-size: 16px;
    }

    .bloco {
      margin-bottom: 40px;
    }

    .introducao {
      background-color: #f7f9fc;
      padding: 18px;
      border-left: 4px solid #1f3c88;
      border-radius: 8px;
      line-height: 1.6;
      margin-bottom: 20px;
    }

    .texto-ajuda {
      margin-top: 10px;
      font-size: 15px;
      color: #333;
    }

    .dados {
      background: #f7f9fc;
      padding: 12px;
      border-radius: 6px;
    }

    h3 {
      margin-bottom: 6px;
      color: #333;
      font-size: 15px;
      font-weight: 600;
    }

    p {
      margin: 6px 0;
    }

    input, textarea, select {
      width: 100%;
      padding: 8px;
      border-radius: 4px;
      border: 1px solid #ccc;
      margin-top: 5px;
      box-sizing: border-box;
      font-size: 13px;
    }

    textarea {
      min-height: 90px;
      resize: vertical;
    }

    button {
      background-color: #1f3c88;
      color: white;
      padding: 12px 16px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      margin-top: 10px;
      font-weight: bold;
    }

    button:hover {
      background-color: #16306d;
    }

    .opcoes-linha {
      display: flex;
      gap: 20px;
      margin-top: 8px;
      flex-wrap: wrap;
    }

    .opcao-box {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      font-size: 14px;
    }

    .opcao-box input {
      appearance: none;
      width: 16px;
      height: 16px;
      border: 2px solid #1f3c88;
      border-radius: 4px;
      position: relative;
      margin: 0;
    }

    .opcao-box input:checked {
      background-color: #1f3c88;
    }

    .opcao-box input:checked::after {
      content: "✔";
      color: white;
      font-size: 11px;
      position: absolute;
      top: -1px;
      left: 2px;
    }

    .escala {
      display: inline-block;
      margin-top: 10px;
      max-width: 100%;
      overflow-x: auto;
      padding-bottom: 4px;
    }

    .numeros,
    .bolinhas {
      display: grid;
      grid-template-columns: repeat(10, 30px);
      column-gap: 16px;
      justify-content: start;
      min-width: max-content;
    }

    .numeros {
      margin-bottom: 6px;
    }

    .numeros span {
      text-align: center;
      font-size: 14px;
    }

    .bolinhas input {
      appearance: none;
      width: 16px;
      height: 16px;
      border: 2px solid #1f3c88;
      border-radius: 4px;
      cursor: pointer;
      margin: 0 auto;
      position: relative;
    }

    .bolinhas input:checked {
      background-color: #1f3c88;
    }

    .bolinhas input:checked::after {
      content: "✔";
      color: white;
      font-size: 11px;
      position: absolute;
      top: -1px;
      left: 2px;
    }

    .canais-info {
      display: flex;
      justify-content: space-between;
      margin-top: 15px;
      gap: 20px;
      flex-wrap: wrap;
    }

    .canal-item {
      flex: 1;
      min-width: 180px;
      font-size: 13px;
      line-height: 1.4;
    }

    .canal-item strong {
      display: block;
      margin-bottom: 3px;
      color: #1f3c88;
    }

    .canal-item a {
      color: #1f3c88;
      text-decoration: none;
    }

    .canal-item a:hover {
      text-decoration: underline;
    }

    .caixa-destaque {
      background: #fff9db;
      border-left: 4px solid #eab308;
      padding: 12px;
      border-radius: 8px;
      line-height: 1.5;
    }

</head>

    function normalizarTexto(texto) {
      return String(texto || "")
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/-/g, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function formatarTextoRetorno(tipoRetorno, horarioRetorno) {
      if (!horarioRetorno) return "";
      return tipoRetorno === "apos" ? `Após ${horarioRetorno}` : `Às ${horarioRetorno}`;

    function obterLimiteTentativasSemContato() {

    function definirResponsavelTratativa(atendentePesquisa, horarioRetorno) {
      const [horaTexto, minutoTexto] = String(horarioRetorno || "").split(":");
      const hora = Number(horaTexto || 0);
      const minuto = Number(minutoTexto || 0);
      const totalMinutos = (hora * 60) + minuto;

      const inicioHudson = (7 * 60) + 45;
      const inicioLucas = (11 * 60);
      const meioTurno = (14 * 60);
      const limiteTarde = (16 * 60);
      const fimLucas = (20 * 60);

      const atendente = String(atendentePesquisa || "").trim().toLowerCase();

      if (totalMinutos < inicioHudson || totalMinutos > fimLucas) {
        return {
          erro: "O horário informado está fora do período disponível para retorno."
        };
      }

      if (totalMinutos < inicioLucas) {
        if (atendente === "hudson") {
          return { responsavel: "Tamara" };
        }
        return { responsavel: "Hudson" };
      }

      if (totalMinutos > limiteTarde) {
        if (atendente === "lucas") {
          return {
            erro: "Esse horário ficaria somente com o Lucas disponível, e a tratativa não pode voltar para quem realizou a pesquisa."
          };
        }
        return { responsavel: "Lucas" };
      }

      if (atendente === "hudson") {
        return { responsavel: "Lucas" };
      }

      if (atendente === "lucas") {
        return { responsavel: "Hudson" };
      }

      if (atendente === "tamara" || atendente === "carlos") {
        return { responsavel: totalMinutos < meioTurno ? "Hudson" : "Lucas" };
      }

      return { responsavel: totalMinutos < meioTurno ? "Hudson" : "Lucas" };
    }

    function definirResponsavelRetorno(atendenteAtual, horarioRetorno) {
      const [horaTexto, minutoTexto] = String(horarioRetorno || "").split(":");
      const hora = Number(horaTexto || 0);
      const minuto = Number(minutoTexto || 0);
      const totalMinutos = (hora * 60) + minuto;

      const atendente = String(atendenteAtual || "").trim().toLowerCase();

      if (totalMinutos < (11 * 60)) {
        if (atendente === "hudson") {
          return "Tamara";
        }
        return "Hudson";
      }

      if (totalMinutos > (16 * 60)) {
        return "Lucas";
      }

      if (atendente === "hudson") {
        return "Lucas";
      }

      if (atendente === "lucas") {
        return "Hudson";
      }

      if (atendente === "tamara" || atendente === "carlos") {
        return totalMinutos < (14 * 60) ? "Hudson" : "Lucas";
      }

      return totalMinutos < (14 * 60) ? "Hudson" : "Lucas";

    function atualizarCamposDinamicos() {
      const statusPesquisa = document.querySelector('input[name="statusPesquisa"]:checked')?.value || "";
      const necessitaTratativa = document.querySelector('input[name="necessitaTratativa"]:checked')?.value || "";

      const tratativaBox = document.getElementById("tratativaBox");
      const motivoTratativaBox = document.getElementById("motivoTratativaBox");
      const tipoRetornoBox = document.getElementById("tipoRetornoBox");
      const campoRetorno = document.getElementById("campoRetorno");
      const horarioRetorno = document.getElementById("horarioRetorno");
      const motivoTratativa = document.getElementById("motivoTratativa");
      const radiosTipoRetorno = document.querySelectorAll('input[name="tipoRetorno"]');
      const radiosTratativa = document.querySelectorAll('input[name="necessitaTratativa"]');

      if (!tratativaBox || !motivoTratativaBox || !tipoRetornoBox || !campoRetorno) return;

      tratativaBox.style.display = "none";
      motivoTratativaBox.style.display = "none";
      tipoRetornoBox.style.display = "none";
      campoRetorno.style.display = "none";

      if (statusPesquisa !== "realizada") {
        radiosTratativa.forEach(function(item) {
          item.checked = false;
        });
        if (motivoTratativa) motivoTratativa.value = "";
      }

      if (statusPesquisa !== "retorno" && statusPesquisa !== "realizada") {
        if (horarioRetorno) horarioRetorno.value = "";
        radiosTipoRetorno.forEach(function(item) {
          item.checked = false;
        });
      }

      if (statusPesquisa === "realizada") {
        tratativaBox.style.display = "block";

        if (necessitaTratativa === "sim") {
          motivoTratativaBox.style.display = "block";
          tipoRetornoBox.style.display = "block";
          campoRetorno.style.display = "block";
        }
      }

      if (statusPesquisa === "retorno") {
        tipoRetornoBox.style.display = "block";
        campoRetorno.style.display = "block";
      }
    }

    document.addEventListener("change", function(e) {
      if (
        e.target.name === "statusPesquisa" ||
        e.target.name === "necessitaTratativa"
      ) {
        atualizarCamposDinamicos();
      }

      if (e.target.name === "statusTratativa") {
        const statusTratativa = e.target.value;
        const tipoBox = document.getElementById("tratativaTipoRetornoBox");
        const campoBox = document.getElementById("tratativaCampoRetorno");
        const horario = document.getElementById("tratativaHorarioRetorno");
        const radios = document.querySelectorAll('input[name="tratativaTipoRetorno"]');

        if (!tipoBox || !campoBox) return;

        if (statusTratativa === "tratativa_retorno") {
          tipoBox.style.display = "block";
          campoBox.style.display = "block";
        } else {
          tipoBox.style.display = "none";
          campoBox.style.display = "none";
          if (horario) horario.value = "";
          radios.forEach(function(item) {
            item.checked = false;
          });
        }
      }
    });

    async function enviarTratativa() {
      const botao = document.getElementById("btnEnviarTratativa");
      if (botao && botao.disabled) return;
      if (botao) botao.disabled = true;

      try {
        const atendente = document.getElementById("atendenteTratativa")?.value || "";
        const comentario = document.getElementById("comentarioTratativa")?.value || "";
        const statusTratativa = document.querySelector('input[name="statusTratativa"]:checked')?.value || null;
        const horarioRetorno = document.getElementById("tratativaHorarioRetorno")?.value || "";
        const tipoRetorno = document.querySelector('input[name="tratativaTipoRetorno"]:checked')?.value || null;
        const tecnicoSelecionado = document.getElementById("tecnico")?.value || "";

        if (!atendente) {
          alert("Selecione o atendente que realizou a tratativa!");
          return;
        }

        if (!tecnicoSelecionado) {
          alert("Selecione o técnico!");
          return;
        }

        if (!statusTratativa) {
          alert("Selecione o status da tratativa!");
          return;
        }

        if (statusTratativa === "tratativa_retorno") {
          if (!horarioRetorno) {
            alert("Informe o horário para retorno!");
            return;
          }

          if (!tipoRetorno) {
            alert("Selecione o tipo de retorno!");
            return;
          }

          const validacaoTratativa = definirResponsavelTratativa(atendente, horarioRetorno);
          if (validacaoTratativa.erro) {
            alert(validacaoTratativa.erro);
            return;
          }
        }

        const limiteTentativasSemContato = obterLimiteTentativasSemContato();

        const resposta = {
          cliente: nome || null,
          tipo: tipo || null,
          tecnico: tecnicoSelecionado,
          atendente: atendente,
          pergunta1: null,
          pergunta2: null,
          pergunta3: null,
          comentario: comentario,
          status: statusTratativa,
          data: new Date().toISOString().slice(0, 10),
          dadosCorretos: null,
          canais: null,
          problemaResolvido: null,
          indicacao: null,
          horario_retorno: statusTratativa === "tratativa_retorno" ? horarioRetorno : null,
          tipo_retorno: statusTratativa === "tratativa_retorno" ? tipoRetorno : null,
          necessita_tratativa: "sim",
          motivo_tratativa: motivoTratativaOriginal || null
        };

        const { error } = await supabaseClient
          .from("respostas")
          .insert([resposta]);

        if (error) {
          console.error("Erro ao salvar tratativa:", error);
          alert("Erro ao salvar no Supabase: " + error.message);
          return;
        }

        const { data: clienteAtual, error: erroBuscaCliente } = await supabaseClient
          .from("clientes")
          .select("tentativas_sem_contato, atendente_responsavel")
          .eq("id", clienteId)
          .single();

        if (erroBuscaCliente) {
          console.error("Erro ao buscar cliente:", erroBuscaCliente);
          alert("A tratativa foi salva, mas deu erro ao buscar os dados do cliente: " + erroBuscaCliente.message);
          return;
        }

        let dadosAtualizacaoCliente = {
          ultima_tentativa_por: atendente
        };

        if (statusTratativa === "tratativa_resolvida") {
          dadosAtualizacaoCliente.status_pesquisa = "concluido";
          dadosAtualizacaoCliente.tentativas_sem_contato = 0;
        } else if (statusTratativa === "tratativa_retorno") {
          const regraTratativa = definirResponsavelTratativa(atendente, horarioRetorno);

          if (regraTratativa.erro) {
            alert(regraTratativa.erro);
            return;
          }

          dadosAtualizacaoCliente.status_pesquisa = "pendente";
          dadosAtualizacaoCliente.tentativas_sem_contato = 0;
          dadosAtualizacaoCliente.atendente_responsavel = regraTratativa.responsavel;
        } else if (statusTratativa === "tratativa_sem_contato") {
          const tentativasAtuais = Number(clienteAtual?.tentativas_sem_contato || 0);
          const novasTentativas = tentativasAtuais + 1;

          dadosAtualizacaoCliente.tentativas_sem_contato = novasTentativas;

          if (novasTentativas >= limiteTentativasSemContato) {
            dadosAtualizacaoCliente.status_pesquisa = "concluido";
            dadosAtualizacaoCliente.atendente_responsavel = clienteAtual?.atendente_responsavel || atendente;
          } else {
            const regraTratativa = definirResponsavelTratativa(atendente, horarioRetornoOriginal);

            if (regraTratativa.erro) {
              alert(regraTratativa.erro);
              return;
            }

            dadosAtualizacaoCliente.status_pesquisa = "pendente";
            dadosAtualizacaoCliente.atendente_responsavel = regraTratativa.responsavel;
          }
        }

        const { error: erroCliente } = await supabaseClient
          .from("clientes")
          .update(dadosAtualizacaoCliente)
          .eq("id", clienteId);

        if (erroCliente) {
          console.error("Erro ao atualizar cliente:", erroCliente);
          alert("A tratativa foi salva, mas deu erro ao atualizar a fila: " + erroCliente.message);
          return;
        }

        alert("Tratativa salva com sucesso!");
        window.location.href = "index.html";

      } finally {
        if (botao) botao.disabled = false;
      }
    }

    async function enviar() {
      const atendente = document.getElementById("atendente")?.value || "";
      const tecnicoSelecionado = document.getElementById("tecnico")?.value || "";
      const pergunta1 = document.querySelector('input[name="pergunta1"]:checked')?.value || null;
      const pergunta2 = document.querySelector('input[name="pergunta2"]:checked')?.value || null;
      const pergunta3 = document.querySelector('input[name="pergunta3"]:checked')?.value || null;
      const statusPesquisa = document.querySelector('input[name="statusPesquisa"]:checked')?.value || null;
      const tipoRetorno = document.querySelector('input[name="tipoRetorno"]:checked')?.value || null;
      const necessitaTratativa = document.querySelector('input[name="necessitaTratativa"]:checked')?.value || null;
      const horarioRetorno = document.getElementById("horarioRetorno")?.value || "";
      const motivoTratativa = document.getElementById("motivoTratativa")?.value?.trim() || "";

      if (!atendente) {
        alert("Selecione o atendente que realizou a pesquisa!");
        return;
      }

      if (!tecnicoSelecionado) {
        alert("Selecione o técnico!");
        return;
      }

      if (!statusPesquisa) {
        alert("Selecione o status da pesquisa!");
        return;
      }

      if (statusPesquisa === "retorno") {
        if (!horarioRetorno) {
          alert("Informe o horário para retorno!");
          return;
        }

        if (!tipoRetorno) {
          alert("Selecione o tipo de retorno!");
          return;
        }
      }

      if (statusPesquisa === "realizada") {
        if (!pergunta1 || !pergunta2 || !pergunta3) {
          alert("Preencha todas as avaliações!");
          return;
        }

        if (!necessitaTratativa) {
          alert("Informe se é necessária tratativa!");
          return;
        }

        if (necessitaTratativa === "sim") {
          if (!motivoTratativa) {
            alert("Descreva o motivo da tratativa!");
            return;
          }

          if (!horarioRetorno) {
            alert("Informe o horário para retorno!");
            return;
          }

          if (!tipoRetorno) {
            alert("Selecione o tipo de retorno!");
            return;
          }

          const validacaoTratativa = definirResponsavelTratativa(atendente, horarioRetorno);
          if (validacaoTratativa.erro) {
            alert(validacaoTratativa.erro);
            return;
          }
        }
      }

      const limiteTentativasSemContato = obterLimiteTentativasSemContato();

      let resposta = {
        cliente: nome || null,
        tipo: tipo || null,
        tecnico: tecnicoSelecionado,
        atendente: atendente,
        pergunta1: pergunta1 ? Number(pergunta1) : null,
        pergunta2: pergunta2 ? Number(pergunta2) : null,
        pergunta3: pergunta3 ? Number(pergunta3) : null,
        comentario: document.getElementById("comentario")?.value || "",
        status: statusPesquisa,
        data: new Date().toISOString().slice(0, 10),
        dadosCorretos: null,
        canais: null,
        problemaResolvido: null,
        indicacao: null,
        horario_retorno: null,
        tipo_retorno: null,
        necessita_tratativa: null,
        motivo_tratativa: null
      };

      if (statusPesquisa === "retorno") {
        resposta.horario_retorno = horarioRetorno || null;
        resposta.tipo_retorno = tipoRetorno;
      }

      if (statusPesquisa === "realizada") {
        resposta.necessita_tratativa = necessitaTratativa || null;

        if (necessitaTratativa === "sim") {
          resposta.horario_retorno = horarioRetorno || null;
          resposta.tipo_retorno = tipoRetorno;
          resposta.motivo_tratativa = motivoTratativa || null;
        }
      }

      if (tipo === "Pós Venda") {
  resposta.dadosCorretos = document.querySelector('input[name="dadosCorretos"]:checked')?.value || null;
  resposta.canais = document.querySelector('input[name="canais"]:checked')?.value || null;
} else {
  resposta.problemaResolvido = document.querySelector('input[name="problemaResolvido"]:checked')?.value || null;

  const indicacaoSelecionada = document.querySelector('input[name="indicacao"]:checked')?.value || null;

  if (indicacaoSelecionada === "sim") {
    resposta.indicacao = 10;
  } else if (indicacaoSelecionada === "nao") {
    resposta.indicacao = 0;
  } else {
    resposta.indicacao = null;
  }
}

      const { error } = await supabaseClient
        .from("respostas")
        .insert([resposta]);

      if (error) {
        console.error("Erro ao salvar resposta:", error);
        alert("Erro ao salvar no Supabase: " + error.message);
        return;
      }

      const { data: clienteAtual, error: erroBuscaCliente } = await supabaseClient
        .from("clientes")
        .select("tentativas_sem_contato, atendente_responsavel")
        .eq("id", clienteId)
        .single();

      if (erroBuscaCliente) {
        console.error("Erro ao buscar cliente:", erroBuscaCliente);
        alert("A pesquisa foi salva, mas deu erro ao buscar os dados do cliente: " + erroBuscaCliente.message);
        return;
      }

      let dadosAtualizacaoCliente = {
        ultima_tentativa_por: atendente
      };

      if (statusPesquisa === "realizada") {
        if (necessitaTratativa === "sim") {
          const regraTratativa = definirResponsavelTratativa(atendente, horarioRetorno);

          if (regraTratativa.erro) {
            alert(regraTratativa.erro);
            return;
          }

          dadosAtualizacaoCliente.status_pesquisa = "pendente";
          dadosAtualizacaoCliente.tentativas_sem_contato = 0;
          dadosAtualizacaoCliente.atendente_responsavel = regraTratativa.responsavel;
        } else {
          dadosAtualizacaoCliente.status_pesquisa = "concluido";
          dadosAtualizacaoCliente.tentativas_sem_contato = 0;
        }
      } else if (statusPesquisa === "nao_quis") {
        dadosAtualizacaoCliente.status_pesquisa = "concluido";
        dadosAtualizacaoCliente.tentativas_sem_contato = 0;
      } else if (statusPesquisa === "cnpj_nao_realizada") {
        dadosAtualizacaoCliente.status_pesquisa = "concluido";
        dadosAtualizacaoCliente.tentativas_sem_contato = 0;
      } else if (statusPesquisa === "retorno") {
        const novoResponsavel = definirResponsavelRetorno(atendente, horarioRetorno);
        dadosAtualizacaoCliente.status_pesquisa = "pendente";
        dadosAtualizacaoCliente.tentativas_sem_contato = 0;
        dadosAtualizacaoCliente.atendente_responsavel = novoResponsavel;
      } else if (statusPesquisa === "sem_contato") {
        const tentativasAtuais = Number(clienteAtual?.tentativas_sem_contato || 0);
        const novasTentativas = tentativasAtuais + 1;

        dadosAtualizacaoCliente.tentativas_sem_contato = novasTentativas;

        if (novasTentativas >= limiteTentativasSemContato) {
          dadosAtualizacaoCliente.status_pesquisa = "concluido";
          dadosAtualizacaoCliente.atendente_responsavel = clienteAtual?.atendente_responsavel || atendente;
        } else {
          if (limiteTentativasSemContato === 2 && horarioRetornoOriginal) {
            const novoResponsavel = definirResponsavelRetorno(atendente, horarioRetornoOriginal);
            dadosAtualizacaoCliente.status_pesquisa = "pendente";
            dadosAtualizacaoCliente.atendente_responsavel = novoResponsavel;
          } else {
            const filaAtendentes = ["Carlos", "Hudson", "Lucas", "Tamara"];
            const atendenteAtual = String(clienteAtual?.atendente_responsavel || atendente || "").trim();

            let indiceAtual = filaAtendentes.findIndex(function(nomeFila) {
              return nomeFila.trim().toLowerCase() === atendenteAtual.toLowerCase();
            });

            if (indiceAtual === -1) {
              indiceAtual = filaAtendentes.findIndex(function(nomeFila) {
                return nomeFila.trim().toLowerCase() === String(atendente).trim().toLowerCase();
              });
            }

            const proximoIndice = indiceAtual === -1 ? 0 : (indiceAtual + 1) % filaAtendentes.length;
            const proximoAtendente = filaAtendentes[proximoIndice];

            dadosAtualizacaoCliente.status_pesquisa = "pendente";
            dadosAtualizacaoCliente.atendente_responsavel = proximoAtendente;
          }
        }
      }

      const { error: erroCliente } = await supabaseClient
        .from("clientes")
        .update(dadosAtualizacaoCliente)
        .eq("id", clienteId);

      if (erroCliente) {
        console.error("Erro ao atualizar cliente:", erroCliente);
        alert("A pesquisa foi salva, mas deu erro ao atualizar a fila: " + erroCliente.message);
        return;
      }

      alert("Pesquisa salva com sucesso!");
      window.location.href = "index.html";
    }

    function logout() {
      localStorage.removeItem("usuarioLogado");
      window.location.href = "login.html";
    }

    if (modo === "tratativa") {
      montarFormularioTratativa();
    } else {
      carregarFormularioNormal();
      atualizarCamposDinamicos();
    }

    setTimeout(() => {
      const campo = document.getElementById("atendente");
      const texto = document.getElementById("nomeAtendenteTexto");

      if (campo && texto) {
        texto.innerText = campo.value;
      }
    }, 500);
  </script>
