<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Pesquisa de Satisfação</title>

  <style>
    body {
      font-family: Arial;
      background: #f4f6f9;
      padding: 30px;
    }

    .container {
      max-width: 800px;
      margin: auto;
      background: white;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    h2 {
      color: #1f3c88;
    }

    label {
      display: block;
      margin-top: 15px;
      font-weight: bold;
    }

    select, input, textarea {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
    }

    button {
      margin-top: 20px;
      padding: 10px;
      background: #1f3c88;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #16306d;
    }
  </style>
</head>

<body>

<div class="container">

  <h2>Pesquisa de Satisfação</h2>

  <p><b>Cliente:</b> <span id="cliente"></span></p>
  <p><b>Bairro:</b> <span id="bairro"></span></p>
  <p><b>Telefone:</b> <span id="telefone"></span></p>
  <p><b>Email:</b> <span id="email"></span></p>
  <p><b>Data:</b> <span id="data"></span></p>
  <p><b>Vendedor:</b> <span id="vendedor"></span></p>
  <p><b>Técnico:</b> <span id="tecnico"></span></p>

  <label>Atendente:</label>
  <select id="atendente"></select>

  <div id="perguntas"></div>

  <button onclick="enviar()">Enviar</button>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const SUPABASE_URL = "https://etfdhxdgczpkglgoggyt.supabase.co";
const SUPABASE_KEY = "sb_publishable_AUguEJIlOy_l87hJeHsbNw_VdwPqRAl";

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ===== PEGAR PARAMETROS =====
const params = new URLSearchParams(window.location.search);

const codigo = params.get("codigo");
const nome = params.get("nome");
const bairro = params.get("bairro");
const telefone = params.get("telefone");
const email = params.get("email");
const data = params.get("data");
const vendedor = params.get("vendedor");
const tecnico = params.get("tecnico");
const tipo = params.get("tipo");

// ===== MOSTRAR DADOS =====
document.getElementById("cliente").innerText = nome || "Não informado";
document.getElementById("bairro").innerText = bairro || "Não informado";
document.getElementById("telefone").innerText = telefone || "Não informado";
document.getElementById("email").innerText = email || "Não informado";
document.getElementById("data").innerText = data || "Não informado";
document.getElementById("vendedor").innerText = vendedor || "Não informado";
document.getElementById("tecnico").innerText = tecnico || "Não informado";

// ===== CARREGAR ATENDENTES DO BANCO =====
async function carregarAtendentes() {
  let { data, error } = await supabaseClient
    .from("usuarios")
    .select("*")
    .eq("perfil", "atendente");

  let select = document.getElementById("atendente");

  if (error) {
    console.error(error);
    return;
  }

  data.forEach(u => {
    let opt = document.createElement("option");
    opt.value = u.nome;
    opt.textContent = u.nome;
    select.appendChild(opt);
  });
}

carregarAtendentes();

// ===== GERAR PERGUNTAS =====
function gerarPerguntas() {
  let div = document.getElementById("perguntas");

  if (tipo === "Pós Venda") {
    div.innerHTML = `
      <label>Os dados estão corretos?</label>
      <select id="dadosCorretos">
        <option value="Sim">Sim</option>
        <option value="Não">Não</option>
      </select>

      <label>Como avalia o atendimento?</label>
      <select id="pergunta1">
        ${gerarNotas()}
      </select>

      <label>Como avalia o técnico?</label>
      <select id="pergunta2">
        ${gerarNotas()}
      </select>

      <label>De 0 a 10, quanto indicaria?</label>
      <select id="pergunta3">
        ${gerarNotasNPS()}
      </select>
    `;
  } else {
    div.innerHTML = `
      <label>Problema resolvido?</label>
      <select id="problemaResolvido">
        <option value="Sim">Sim</option>
        <option value="Não">Não</option>
      </select>

      <label>Como avalia o atendimento?</label>
      <select id="pergunta1">
        ${gerarNotas()}
      </select>

      <label>Como avalia o suporte?</label>
      <select id="pergunta2">
        ${gerarNotas()}
      </select>

      <label>De 0 a 10, quanto indicaria?</label>
      <select id="indicacao">
        ${gerarNotasNPS()}
      </select>
    `;
  }
}

function gerarNotas() {
  let html = "";
  for (let i = 1; i <= 5; i++) {
    html += `<option value="${i}">${i}</option>`;
  }
  return html;
}

function gerarNotasNPS() {
  let html = "";
  for (let i = 0; i <= 10; i++) {
    html += `<option value="${i}">${i}</option>`;
  }
  return html;
}

gerarPerguntas();

// ===== ENVIAR =====
async function enviar() {

  let resposta = {
    codigo,
    cliente: nome,
    bairro,
    telefone,
    email,
    data,
    vendedor,
    tecnico,
    tipo,
    atendente: document.getElementById("atendente").value,
    pergunta1: document.getElementById("pergunta1")?.value || null,
    pergunta2: document.getElementById("pergunta2")?.value || null,
    pergunta3: document.getElementById("pergunta3")?.value || null,
    indicacao: document.getElementById("indicacao")?.value || null,
    dadosCorretos: document.getElementById("dadosCorretos")?.value || null,
    problemaResolvido: document.getElementById("problemaResolvido")?.value || null
  };

  let { error } = await supabaseClient
    .from("respostas")
    .insert([resposta]);

  if (error) {
    alert("Erro ao salvar: " + error.message);
    return;
  }

  alert("Pesquisa salva com sucesso!");
  window.location.href = "index.html";
}

</script>

</body>
</html>
