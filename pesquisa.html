<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Pesquisa de Satisfação</title>

    body {
      font-family: Arial, sans-serif;
      background-color: #f4f6f9;
      margin: 0;
      padding: 30px;
      font-size: 14px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      background-color: #ffffff;
      padding: 30px;
      border-radius: 10px;
      box-sizing: border-box;
    }

    .topo-formulario {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 30px;
      margin-bottom: 30px;
    }

    .logo-esquerda,
    .logo-direita {
      width: 120px;
      text-align: center;
    }

    .titulo-centro {
      width: 700px;
      text-align: center;
    }

    .titulo-centro h1 {
      margin-bottom: 10px;
      color: #1f3c88;
    }

    .linha {
      height: 1px;
      background-color: #d9d9d9;
      margin: 10px auto;
      width: 100%;
    }

    .logo-formulario {
      max-width: 110px;
      height: auto;
    }

    #cliente,
    #tipo {
      margin: 4px 0;
      font-size: 16px;
    }

    .bloco {
      margin-bottom: 40px;
    }

    .introducao {
      background-color: #f7f9fc;
      padding: 18px;
      border-left: 4px solid #1f3c88;
      border-radius: 8px;
      line-height: 1.6;
      margin-bottom: 20px;
    }

    .texto-ajuda {
      margin-top: 10px;
      font-size: 15px;
      color: #333;
    }

    .dados {
      background: #f7f9fc;
      padding: 12px;
      border-radius: 6px;
    }

    h3 {
      margin-bottom: 6px;
      color: #333;
      font-size: 15px;
      font-weight: 600;
    }

    p {
      margin: 6px 0;
    }

    input, textarea, select {
      width: 100%;
      padding: 8px;
      border-radius: 4px;
      border: 1px solid #ccc;
      margin-top: 5px;
      box-sizing: border-box;
      font-size: 13px;
    }

    textarea {
      min-height: 90px;
      resize: vertical;
    }

    button {
      background-color: #1f3c88;
      color: white;
      padding: 12px 16px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      margin-top: 10px;
      font-weight: bold;
    }

    button:hover {
      background-color: #16306d;
    }

    .opcoes-linha {
      display: flex;
      gap: 20px;
      margin-top: 8px;
      flex-wrap: wrap;
    }

    .opcao-box {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      font-size: 14px;
    }

    .opcao-box input {
      appearance: none;
      width: 16px;
      height: 16px;
      border: 2px solid #1f3c88;
      border-radius: 4px;
      position: relative;
      margin: 0;
    }

    .opcao-box input:checked {
      background-color: #1f3c88;
    }

    .opcao-box input:checked::after {
      content: "✔";
      color: white;
      font-size: 11px;
      position: absolute;
      top: -1px;
      left: 2px;
    }

    .escala {
      display: inline-block;
      margin-top: 10px;
    }

    .numeros,
    .bolinhas {
      display: grid;
      grid-template-columns: repeat(5, 30px);
      column-gap: 16px;
      justify-content: start;
    }

    .numeros {
      margin-bottom: 6px;
    }

    .numeros span {
      text-align: center;
      font-size: 14px;
    }

    .bolinhas input {
      appearance: none;
      width: 16px;
      height: 16px;
      border: 2px solid #1f3c88;
      border-radius: 4px;
      cursor: pointer;
      margin: 0 auto;
      position: relative;
    }

    .bolinhas input:checked {
      background-color: #1f3c88;
    }

    .bolinhas input:checked::after {
      content: "✔";
      color: white;
      font-size: 11px;
      position: absolute;
      top: -1px;
      left: 2px;
    }

    .canais-info {
      display: flex;
      justify-content: space-between;
      margin-top: 15px;
      gap: 20px;
      flex-wrap: wrap;
    }

    .canal-item {
      flex: 1;
      min-width: 180px;
      font-size: 13px;
      line-height: 1.4;
    }

    .canal-item strong {
      display: block;
      margin-bottom: 3px;
      color: #1f3c88;
    }

    .canal-item a {
      color: #1f3c88;
      text-decoration: none;
    }

    .canal-item a:hover {
      text-decoration: underline;
    }
  </style>
</head>

    async function enviar() {
      const atendente = document.getElementById("atendente")?.value || "";
      const pergunta1 = document.querySelector('input[name="pergunta1"]:checked')?.value || null;
      const pergunta2 = document.querySelector('input[name="pergunta2"]:checked')?.value || null;
      const pergunta3 = document.querySelector('input[name="pergunta3"]:checked')?.value || null;
      const statusPesquisa = document.querySelector('input[name="statusPesquisa"]:checked')?.value || null;

      if (!atendente) {
        alert("Selecione o atendente que realizou a pesquisa!");
        return;
      }

      if (!statusPesquisa) {
        alert("Selecione o status da pesquisa!");
        return;
      }

      if (statusPesquisa === "realizada") {
        if (!pergunta1 || !pergunta2 || !pergunta3) {
          alert("Preencha todas as avaliações!");
          return;
        }
      }

      let resposta = {
        cliente: nome || null,
        tipo: tipo || null,
        tecnico: tecnico || "Não informado",
        atendente: atendente,
        pergunta1: pergunta1 ? Number(pergunta1) : null,
        pergunta2: pergunta2 ? Number(pergunta2) : null,
        pergunta3: pergunta3 ? Number(pergunta3) : null,
        comentario: document.getElementById("comentario")?.value || "",
        status: statusPesquisa,
        data: new Date().toISOString().slice(0, 10),
        dadosCorretos: null,
        canais: null,
        problemaResolvido: null,
        indicacao: null
      };

      if (tipo === "Pós Venda") {
        resposta.dadosCorretos = document.querySelector('input[name="dadosCorretos"]:checked')?.value || null;
        resposta.canais = document.querySelector('input[name="canais"]:checked')?.value || null;
      } else {
        resposta.problemaResolvido = document.querySelector('input[name="problemaResolvido"]:checked')?.value || null;
        const indicacaoSelecionada = document.querySelector('input[name="indicacao"]:checked')?.value || null;
        resposta.indicacao = indicacaoSelecionada ? Number(indicacaoSelecionada) : null;
      }

      const { error } = await supabaseClient
        .from("respostas")
        .insert([resposta]);

      if (error) {
        console.error("Erro ao salvar resposta:", error);
        alert("Erro ao salvar no Supabase: " + error.message);
        return;
      }

      const { data: clienteAtual, error: erroBuscaCliente } = await supabaseClient
  .from("clientes")
  .select("tentativas_sem_contato, atendente_responsavel")
  .eq("id", clienteId)
  .single();

      if (erroBuscaCliente) {
        console.error("Erro ao buscar cliente:", erroBuscaCliente);
        alert("A pesquisa foi salva, mas deu erro ao buscar os dados do cliente: " + erroBuscaCliente.message);
        return;
      }

            let dadosAtualizacaoCliente = {
        ultima_tentativa_por: atendente
      };

      if (statusPesquisa === "realizada" || statusPesquisa === "nao_quis") {
        dadosAtualizacaoCliente.status_pesquisa = "concluido";
        dadosAtualizacaoCliente.tentativas_sem_contato = 0;
      } else if (statusPesquisa === "retorno") {
        dadosAtualizacaoCliente.status_pesquisa = "pendente";
        dadosAtualizacaoCliente.tentativas_sem_contato = 0;
           } else if (statusPesquisa === "sem_contato") {
  const tentativasAtuais = Number(clienteAtual?.tentativas_sem_contato || 0);
  const novasTentativas = tentativasAtuais + 1;

  const filaAtendentes = ["Carlos", "Hudson", "Lucas", "Tamara"];
  const atendenteAtual = String(clienteAtual?.atendente_responsavel || atendente || "").trim();

  let indiceAtual = filaAtendentes.findIndex(function(nome) {
    return nome.trim().toLowerCase() === atendenteAtual.toLowerCase();
  });

  if (indiceAtual === -1) {
    indiceAtual = filaAtendentes.findIndex(function(nome) {
      return nome.trim().toLowerCase() === String(atendente).trim().toLowerCase();
    });
  }

  dadosAtualizacaoCliente.tentativas_sem_contato = novasTentativas;

  if (novasTentativas >= 4) {
    dadosAtualizacaoCliente.status_pesquisa = "concluido";
    dadosAtualizacaoCliente.atendente_responsavel = clienteAtual?.atendente_responsavel || atendente;
  } else {
    const proximoIndice = indiceAtual === -1 ? 0 : (indiceAtual + 1) % filaAtendentes.length;
    const proximoAtendente = filaAtendentes[proximoIndice];

    dadosAtualizacaoCliente.status_pesquisa = "pendente";
    dadosAtualizacaoCliente.atendente_responsavel = proximoAtendente;
  }
}

      console.log("Dados que serão enviados para atualizar o cliente:", dadosAtualizacaoCliente);

const { data: clienteAtualizado, error: erroCliente } = await supabaseClient
  .from("clientes")
  .update(dadosAtualizacaoCliente)
  .eq("id", clienteId)
  .select()
  .single();

if (erroCliente) {
  console.error("Erro ao atualizar cliente:", erroCliente);
  alert("A pesquisa foi salva, mas deu erro ao atualizar a fila: " + erroCliente.message);
  return;
}

console.log("Cliente atualizado no banco:", clienteAtualizado);

      alert("Pesquisa salva com sucesso!");
      window.location.href = "index.html";
    }

    function logout() {
      localStorage.removeItem("usuarioLogado");
      window.location.href = "login.html";
    }

    carregarFormulario();
  </script>
